<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로스트아크 원정대 검색</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="search-panel" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Lost Ark Open API</p>
          <h1 id="page-title">원정대 캐릭터 검색</h1>
        </div>

        <form id="search-form" class="search-form" autocomplete="off">
          <label class="sr-only" for="character-name">캐릭터명</label>
          <input id="character-name" name="characterName" type="text" placeholder="캐릭터명을 입력하세요" required />
          <button id="search-button" type="submit">검색</button>
        </form>

        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>

      <section id="result" class="result" hidden>
        <div class="result-header">
          <div>
            <p id="result-label" class="eyebrow">검색 결과</p>
            <h2 id="result-title">원정대</h2>
          </div>
          <button id="refresh-button" class="ghost-button" type="button">새로고침</button>
        </div>

        <div class="metrics" aria-label="원정대 요약">
          <div class="metric">
            <span>캐릭터</span>
            <strong id="metric-total">0</strong>
          </div>
          <div class="metric">
            <span>최고 레벨</span>
            <strong id="metric-highest-level">-</strong>
          </div>
          <div class="metric">
            <span>대표 서버</span>
            <strong id="metric-server">-</strong>
          </div>
        </div>

        <div class="controls" aria-label="결과 필터">
          <label>
            서버
            <select id="server-filter">
              <option value="all">전체</option>
            </select>
          </label>
          <label>
            직업
            <select id="class-filter">
              <option value="all">전체</option>
            </select>
          </label>
          <label>
            정렬
            <select id="sort-select">
              <option value="level-desc">아이템 레벨 높은 순</option>
              <option value="level-asc">아이템 레벨 낮은 순</option>
              <option value="name-asc">캐릭터명 가나다순</option>
              <option value="server-asc">서버명 가나다순</option>
            </select>
          </label>
        </div>

        <div id="chips" class="chips" aria-label="원정대 분포"></div>
        <div id="character-grid" class="character-grid"></div>
        <p id="empty-result" class="empty" hidden>필터에 맞는 캐릭터가 없습니다.</p>
      </section>
    </main>

    <template id="character-card-template">
      <article class="character-card">
        <div class="card-topline">
          <span class="server"></span>
          <span class="combat-level"></span>
        </div>
        <h3></h3>
        <div class="class-name"></div>
        <div class="item-level">
          <span>아이템 레벨</span>
          <strong></strong>
        </div>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>

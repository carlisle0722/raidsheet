<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>레이드 시트</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Lost Ark Open API</p>
          <h1>레이드 시트</h1>
        </div>
        <button id="refresh-button" class="primary-button" type="button">
          재조회
        </button>
      </header>

      <nav class="tabs" aria-label="시트 탭">
        <button class="tab is-active" type="button">캐릭터 현황</button>
        <button class="tab" type="button" disabled>레이드 배치</button>
        <button class="tab" type="button" disabled>누락 확인</button>
      </nav>

      <section class="summary-strip" aria-label="조회 요약">
        <div class="summary-item">
          <span>서버</span>
          <strong id="server-label">카단</strong>
        </div>
        <div class="summary-item">
          <span>조회 대상</span>
          <strong id="member-count">5명</strong>
        </div>
        <div class="summary-item">
          <span>카단 캐릭터</span>
          <strong id="character-total">-</strong>
        </div>
        <div class="summary-item">
          <span>최고 레벨</span>
          <strong id="highest-level">-</strong>
        </div>
      </section>

      <section class="board-section" aria-labelledby="board-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Roster</p>
            <h2 id="board-title">캐릭터 현황</h2>
          </div>
          <div id="status" class="status" role="status" aria-live="polite">
            자동 조회 대기
          </div>
        </div>

        <div id="roster-board" class="roster-board" aria-live="polite"></div>
      </section>
    </main>

    <template id="member-column-template">
      <article class="member-column">
        <div class="member-heading">
          <div>
            <h3></h3>
            <span class="query-name"></span>
          </div>
          <strong class="member-count">-</strong>
        </div>
        <div class="character-list"></div>
      </article>
    </template>

    <template id="character-row-template">
      <div class="character-row">
        <div class="character-main">
          <strong class="character-name"></strong>
          <span class="class-name"></span>
        </div>
        <div class="character-meta">
          <span class="combat-level"></span>
          <strong class="item-level"></strong>
        </div>
      </div>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
